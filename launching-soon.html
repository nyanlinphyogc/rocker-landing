<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Green Circle Co., Ltd. — Something big is coming. Stay tuned.">
<link rel="canonical" href="https://www.greencirclemm.com/launching-soon.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Something Big is Coming — Green Circle Co., Ltd.">
<meta property="og:description" content="A new chapter from Myanmar's trusted beverage manufacturer. Launching soon.">
<meta property="og:url" content="https://www.greencirclemm.com/launching-soon.html">
<meta property="og:image" content="https://www.greencirclemm.com/og-greencircle.jpg">
<title>Something Big is Coming — Green Circle Co., Ltd.</title>
<link rel="icon" type="image/png" href="https://www.greencirclemm.com/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0C3527;
    --ink-deep: #040F0C;
    --panel: #0A2419;
    --panel-edge: #122E22;
    --leaf: #1E7A4A;
    --gold: #F5B82E;
    --paper: #F4F9F4;
    --muted: rgba(244, 249, 244, 0.62);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: 'Archivo', sans-serif;
    background: var(--ink-deep);
    color: var(--paper);
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .frame {
    width: min(640px, 100%);
    position: relative;
  }

  .accent-h {
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold) 18%, var(--leaf) 82%, transparent);
  }

  .accent-v {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--gold), var(--leaf));
  }

  .accent-v-left { left: 0; }
  .accent-v-right { right: 0; }

  .block {
    position: relative;
    background: linear-gradient(168deg, var(--panel) 0%, var(--ink) 100%);
    border: 1px solid var(--panel-edge);
    padding: clamp(48px, 10vw, 72px) clamp(28px, 6vw, 48px);
    text-align: center;
    box-shadow:
      0 24px 80px rgba(0, 0, 0, 0.45),
      inset 0 1px 0 rgba(244, 249, 244, 0.06);
  }

  .eyebrow {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--leaf);
    margin-bottom: 28px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--gold);
  }

  h1 {
    font-size: clamp(2rem, 6.5vw, 3.25rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.08;
    margin-bottom: 20px;
  }

  .sub {
    font-size: clamp(1rem, 2.4vw, 1.12rem);
    font-weight: 400;
    color: var(--muted);
    max-width: 420px;
    margin: 0 auto 32px;
    line-height: 1.65;
  }

  .divider {
    width: 48px;
    height: 3px;
    margin: 0 auto 24px;
    background: var(--leaf);
    border-radius: 99px;
  }

  .status {
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
  }

  footer {
    margin-top: 20px;
    text-align: center;
    font-size: 0.8rem;
    color: rgba(244, 249, 244, 0.38);
  }

  footer a {
    color: rgba(244, 249, 244, 0.55);
    text-decoration: none;
    font-weight: 600;
  }

  footer a:hover { color: var(--leaf); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>
<div class="frame">
  <div class="accent-h" aria-hidden="true"></div>
  <div class="block">
    <span class="accent-v accent-v-left" aria-hidden="true"></span>
    <span class="accent-v accent-v-right" aria-hidden="true"></span>
    <p class="eyebrow">Green Circle Co., Ltd.</p>
    <h1>Something Big is Coming</h1>
    <p class="sub">
      We're putting the finishing touches on something new from Myanmar's home of
      VeVe, Rocker, and Ion Plus. Check back soon.
    </p>
    <div class="divider" aria-hidden="true"></div>
    <p class="status">Launching soon</p>
  </div>
  <div class="accent-h" aria-hidden="true"></div>
  <footer>
    <a href="mailto:info@greencirclemm.com">info@greencirclemm.com</a>
  </footer>
</div>
</body>
</html>
